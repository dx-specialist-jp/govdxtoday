name: Daily Content Update ─ GovDX Today

on:
  schedule:
    # 毎日 AM 0:00 JST (= UTC 前日 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD)。省略時は今日 JST'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: コンテンツ生成
        run: node scripts/generate-content.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL || 'https://rsshub.app' }}
          TARGET_DATE: ${{ inputs.target_date }}

      - name: Vite ビルド
        run: npm run build

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ docs/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "chore: 日次更新 $(date -u +'%Y-%m-%d')"
          git push
