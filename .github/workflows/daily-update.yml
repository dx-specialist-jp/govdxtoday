name: Daily Content Update ─ GovDX Today

on:
  schedule:
    # UTC 14:00 にキュー投入 → GitHub Actions の遅延（約7時間）により実際は JST 翌朝 6:00 頃に実行される
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD)。省略時は今日 JST'
        required: false

permissions:
  contents: write
  actions: write

# GitHub Pages へのデプロイは行わない（後述）ため、pages/id-token 権限は不要。
#
# 過去の設計では、このワークフロー自身が「コンテンツ生成→コミット＆プッシュ→
# Pages デプロイ」まで行い、かつ deploy.yml とも "pages" concurrency group を
# 共有していた。しかし、このワークフローが public/data/ を push すると、その
# push が deploy.yml（paths: public/** で起動）を即座に誘発してしまう。
# concurrency の cancel-in-progress は「新しく起動した側」の設定で判定される
# ため、deploy.yml 側の cancel-in-progress:true により、まだ Pages デプロイの
# 途中だったこのワークフローが横から強制キャンセルされることがあった
# （このワークフロー側を cancel-in-progress:false にしても防げない）。
# その結果、不完全なデプロイが一時的に本番へ公開され、直近日付のアーカイブ
# JSON が数分間 404 になる、という不具合が発生していた。
#
# 対策として、Pages デプロイは deploy.yml 側の1本に統一する。このワークフローは
# コンテンツ生成とコミット＆プッシュのみを行う（deploy.yml は自分自身の同時実行
# のみ cancel-in-progress で解決すればよく、他ワークフローとの競合キャンセルは
# 発生しなくなる）。今後、このワークフローに再び Pages デプロイ処理を
# 追加しないこと（同じ不具合が再発する）。
#
# 注意: GITHUB_TOKEN で行った push は、他ワークフローの push トリガーを
# 起動しない（GitHub Actions の仕様。無限ループ防止のため）。そのため
# deploy.yml の `on.push` は自動的には発火せず、下の「データをコミット・
# プッシュ」ステップ内で明示的に `gh workflow run deploy.yml` を呼んで
# 起動している（GITHUB_TOKEN でも workflow_dispatch の起動は制限対象外）。
# この呼び出しを削除すると、コンテンツは生成されるがデプロイされない
# 状態（2026-07-13〜07-15に実際発生した不具合）が再発するので注意。
#
# なお、このワークフロー自身（schedule と workflow_dispatch）が万一重複起動
# しても git push が競合しないよう、直列化のみ行う。
concurrency:
  group: daily-content-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: コンテンツ生成
        run: node scripts/generate-content.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ inputs.target_date }}

      - name: AI要約補完（未生成分のみ）
        run: |
          # generate-content.js の Gemini API 呼び出し後にレート制限が完全回復するまで待機。
          # gemini-utils.js のリトライ待機は最大 3回×70秒=210秒/呼び出し（MAX_ATTEMPTS=4）。
          # generate-content.js の政府記事要約・ニュースフィルタは並列実行のため、
          # このステップ開始前の最大待機は概ね210秒 — 300秒あれば十分な余裕がある。
          # なお、クォータ0（回復不可能）は gemini-utils.js が即座に失敗させるため
          # この待機は効かず、regenerate-brief.js 側も数秒で打ち切られる。
          echo "[INFO] Gemini APIレート制限回復のため5分待機..."
          sleep 300
          # TARGET_DATE指定時（手動バックフィル）はその日のみ、未指定時（通常の
          # スケジュール実行）は直近3日分を処理し前日までの取りこぼしを自動補完する。
          # ワークフロー式をrunブロックに直接展開せずenv経由で渡すことで、
          # target_date入力値によるシェルインジェクションを避ける。
          node scripts/regenerate-brief.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ inputs.target_date }}
        continue-on-error: true

      - name: データをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "chore: 日次更新 $(TZ='Asia/Tokyo' date +'%Y-%m-%d')"
          git push
          # GITHUB_TOKEN による push は deploy.yml の on.push を自動起動しない
          # （GitHub Actions の仕様）ため、workflow_dispatch で明示的に起動する。
          # ビルド・GitHub Pages デプロイは deploy.yml 側が行う。このワーク
          # フロー自身はデプロイを行わない（理由は冒頭のコメント参照）。
          gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI要約生成の検証（欠落時はジョブを失敗させて可視化）
        if: always()
        run: node scripts/verify-daily-content.js
        env:
          TARGET_DATE: ${{ inputs.target_date }}
