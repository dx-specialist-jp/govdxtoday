name: Daily Content Update ─ GovDX Today

on:
  schedule:
    # UTC 14:00 にキュー投入 → GitHub Actions の遅延（約7時間）により実際は JST 翌朝 6:00 頃に実行される
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD)。省略時は今日 JST'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: コンテンツ生成
        run: node scripts/generate-content.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ inputs.target_date }}

      - name: AI要約・ブリーフ補完（未生成分のみ）
        run: |
          # generate-content.js の Gemini API 呼び出し後にレート制限が完全回復するまで待機。
          # gemini-utils.js のリトライ待機は最大 3回×70秒=210秒/呼び出し（MAX_ATTEMPTS=4）。
          # generate-content.js の政府記事要約・ニュースフィルタは並列実行のため、
          # このステップ開始前の最大待機は概ね210秒 — 300秒あれば十分な余裕がある。
          # なお、クォータ0（回復不可能）は gemini-utils.js が即座に失敗させるため
          # この待機は効かず、regenerate-brief.js 側も数秒で打ち切られる。
          echo "[INFO] Gemini APIレート制限回復のため5分待機..."
          sleep 300
          # TARGET_DATE指定時（手動バックフィル）はその日のみ、未指定時（通常の
          # スケジュール実行）は直近3日分を処理し前日までの取りこぼしを自動補完する。
          # ワークフロー式をrunブロックに直接展開せずenv経由で渡すことで、
          # target_date入力値によるシェルインジェクションを避ける。
          node scripts/regenerate-brief.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ inputs.target_date }}
        continue-on-error: true

      - name: Vite ビルド
        run: npm run build

      - name: データをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "chore: 日次更新 $(date -u +'%Y-%m-%d')"
          git push

      - name: GitHub Pages 設定
        uses: actions/configure-pages@v5

      - name: Pages アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4

      - name: AI要約生成の検証（欠落時はジョブを失敗させて可視化）
        if: always()
        run: node scripts/verify-daily-content.js
        env:
          TARGET_DATE: ${{ inputs.target_date }}
