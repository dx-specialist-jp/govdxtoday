name: Daily Content Update ─ GovDX Today

on:
  schedule:
    # UTC 14:00 にキュー投入 → GitHub Actions の遅延（約7時間）により実際は JST 翌朝 6:00 頃に実行される
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD)。省略時は今日 JST'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 対象日を解決
        id: resolve_date
        run: |
          # generate-content.js と verify-daily-content.js が同じ「対象日」を見るよう、
          # ジョブ開始時に一度だけ解決する。各スクリプトが実行タイミングで個別に
          # 「今日」を再計算すると、ビルド・デプロイ等で数分〜数十分かかる間に
          # JST日付境界をまたいだ場合に不一致が起きるため。
          if [ -n "${{ inputs.target_date }}" ]; then
            echo "date=${{ inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: コンテンツ生成
        run: node scripts/generate-content.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ steps.resolve_date.outputs.date }}

      - name: AI要約・ブリーフ補完（未生成分のみ）
        run: |
          # generate-content.js の Gemini API 呼び出し後にレート制限が完全回復するまで待機。
          # gemini-utils.js のリトライ待機は最大 3回×70秒=210秒/呼び出し（MAX_ATTEMPTS=4）。
          # generate-content.js の政府記事要約・ニュースフィルタは並列実行のため、
          # このステップ開始前の最大待機は概ね210秒 — 300秒あれば十分な余裕がある。
          # なお、クォータ0（回復不可能）は gemini-utils.js が即座に失敗させるため
          # この待機は効かず、regenerate-brief.js 側も数秒で打ち切られる。
          echo "[INFO] Gemini APIレート制限回復のため5分待機..."
          sleep 300
          if [ -n "${{ inputs.target_date }}" ]; then
            # 手動バックフィル実行: 明示指定された日付のみを対象にする。
            # 引数なし実行（直近3日分固定）だと、3日より前の欠損日は
            # 手動指定しても永遠に補完対象に入らないため。
            node scripts/regenerate-brief.js "${{ steps.resolve_date.outputs.date }}"
          else
            # 通常のスケジュール実行: 直近3日分を処理し、前日までの取りこぼしを自動補完する
            node scripts/regenerate-brief.js
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      - name: Vite ビルド
        run: npm run build

      - name: データをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "chore: 日次更新 $(date -u +'%Y-%m-%d')"
          git push

      - name: GitHub Pages 設定
        uses: actions/configure-pages@v5

      - name: Pages アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4

      - name: AI要約生成の検証（欠落時はジョブを失敗させて可視化）
        if: always()
        run: node scripts/verify-daily-content.js
        env:
          TARGET_DATE: ${{ steps.resolve_date.outputs.date }}
